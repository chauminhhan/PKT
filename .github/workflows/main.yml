name: Build C++ Project

on:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: microsoft/setup-msbuild@v1

      - run: msbuild PacketTracerRecovery.sln /p:Configuration=Release

      - uses: actions/upload-artifact@v3
        with:
          name: build
          path: |
            PacketTracerInjector/Release/*
            PacketTracerDll/Release/*
